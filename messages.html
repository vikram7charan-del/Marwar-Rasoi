<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C04000">
<title>💬 कस्टमर मैसेज — मारवाड़ रसोई</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --saffron:#E85D04;
  --deep-saffron:#C04000;
  --cream:#FFF8E7;
  --warm-bg:#FDF6E3;
  --ink:#2B1810;
  --soft-ink:#5C3A21;
  --muted:#8a7158;
  --gold:#D4A017;
  --green:#2D6A4F;
  --green-light:#52B788;
  --red:#9D0208;
  --blue:#1d4e89;
  --border:#E6D5B8;
  --shadow:rgba(80,40,10,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:'Inter','Segoe UI',sans-serif;
  background:var(--warm-bg);
  color:var(--ink);
  min-height:100vh;
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  padding-bottom:24px;
}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}

.header{
  background:linear-gradient(135deg,var(--deep-saffron),var(--saffron));
  color:var(--cream);
  padding:12px 14px;
  position:sticky;
  top:0;
  z-index:50;
  box-shadow:0 2px 12px var(--shadow);
}
.header-row{display:flex;align-items:center;gap:10px}
.back-btn{
  width:36px;height:36px;
  background:rgba(255,255,255,0.18);
  border:1px solid rgba(255,255,255,0.3);
  color:#fff;
  border-radius:9px;
  font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  flex-shrink:0;
  text-decoration:none;
}
.title{
  font-family:'Tiro Devanagari Hindi',serif;
  font-size:18px;
  flex:1;
}
.title small{display:block;font-size:10px;opacity:0.85;letter-spacing:0.6px;margin-top:1px;font-family:'Inter',sans-serif}

.search-wrap{
  position:sticky;
  top:60px;
  z-index:40;
  background:var(--warm-bg);
  padding:8px 12px;
  border-bottom:1px solid var(--border);
}
.input{
  width:100%;
  padding:10px 12px;
  font-size:14px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  font-family:inherit;
  color:var(--ink);
}
.input:focus{outline:none;border-color:var(--deep-saffron)}

.filter-pills{
  display:flex;
  gap:6px;
  overflow-x:auto;
  padding:8px 12px;
  background:#fff;
  border-bottom:1px solid var(--border);
  scrollbar-width:none;
}
.filter-pills::-webkit-scrollbar{display:none}
.pill{
  flex-shrink:0;
  padding:5px 12px;
  background:var(--cream);
  border:1px solid var(--border);
  border-radius:16px;
  font-size:12px;
  font-weight:500;
  color:var(--soft-ink);
  cursor:pointer;
  white-space:nowrap;
}
.pill.active{background:var(--deep-saffron);color:#fff;border-color:var(--deep-saffron)}

.bulk-bar{
  background:#fff;
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.bulk-bar .bb-title{
  width:100%;
  font-size:11px;
  font-weight:700;
  color:var(--deep-saffron);
  text-transform:uppercase;
  letter-spacing:0.6px;
  margin-bottom:4px;
}
.bulk-btn{
  flex:1;
  min-width:120px;
  padding:7px 10px;
  background:var(--cream);
  border:1px solid var(--border);
  border-radius:8px;
  font-size:12px;
  font-weight:600;
  color:var(--ink);
  cursor:pointer;
}
.bulk-btn.green{background:var(--green);color:#fff;border-color:var(--green)}
.bulk-btn.gold{background:var(--gold);color:#fff;border-color:var(--gold)}
.bulk-btn.blue{background:var(--blue);color:#fff;border-color:var(--blue)}

.list{padding:8px 12px}
.cust-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 12px;
  margin-bottom:6px;
}
.cc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.cc-name{font-size:14px;font-weight:600;line-height:1.3}
.cc-meta{font-size:11px;color:var(--muted);margin-top:2px}
.cc-actions{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-top:8px;
}
.btn{
  padding:6px 10px;
  font-size:11px;
  font-weight:600;
  border:1px solid var(--border);
  background:#fff;
  border-radius:7px;
  cursor:pointer;
  font-family:inherit;
  color:var(--ink);
}
.btn.green{background:var(--green);color:#fff;border-color:var(--green)}
.btn.gold{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn.blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.ghost{background:var(--cream)}

.empty{text-align:center;padding:50px 12px;color:var(--muted)}
.empty .ic{font-size:50px;display:block;margin-bottom:8px}

/* Modal */
.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:200;
  display:none;
  align-items:flex-end;
  justify-content:center;
}
.modal-bg.show{display:flex}
.modal{
  background:#fff;
  width:100%;
  max-width:520px;
  max-height:90vh;
  overflow-y:auto;
  border-radius:18px 18px 0 0;
  padding:18px 16px;
  position:relative;
}
.modal-handle{
  width:40px;height:4px;
  background:var(--border);
  border-radius:2px;
  margin:0 auto 12px;
}
.modal-close{
  position:absolute;top:10px;right:14px;
  background:none;border:none;
  font-size:22px;
  cursor:pointer;color:var(--muted);
}
.modal-title{font-size:16px;font-weight:700;margin-bottom:8px}
.field{margin-bottom:10px}
.label{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.4px}
.textarea{
  width:100%;
  padding:10px;
  font-size:13px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  font-family:inherit;
  color:var(--ink);
  min-height:120px;
  resize:vertical;
}
.section-card{
  background:var(--cream);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  margin-bottom:8px;
}
.section-card-title{
  font-size:12px;
  font-weight:700;
  color:var(--deep-saffron);
  margin-bottom:6px;
}
.btn-block{width:100%;display:block;padding:10px;font-size:13px}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}
.btn-row > *{flex:1;min-width:90px}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}

@media(min-width:600px){
  .modal-bg{align-items:center;padding:14px}
  .modal{border-radius:18px}
}

.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--ink);
  color:var(--cream);
  padding:10px 18px;
  border-radius:10px;
  font-size:13px;
  font-weight:500;
  opacity:0;
  pointer-events:none;
  transition:all 0.3s;
  z-index:300;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.notice{
  background:#FEF3C7;
  border:1px solid #FCD34D;
  border-radius:8px;
  padding:10px 12px;
  margin:10px 12px;
  font-size:12px;
  color:#78350F;
}
</style>
</head>
<body>

<header class="header">
  <div class="header-row">
    <a href="index.html" class="back-btn">←</a>
    <div class="title">💬 कस्टमर मैसेज<small>WHATSAPP / SMS हब</small></div>
  </div>
</header>

<div class="search-wrap">
  <input type="text" class="input" id="q" placeholder="ग्राहक खोजें (नाम / फोन)..." autocomplete="off">
</div>

<div class="filter-pills" id="pills">
  <button class="pill active" data-f="all">सभी</button>
  <button class="pill" data-f="vip">⭐ VIP</button>
  <button class="pill" data-f="phone">📞 फोन वाले</button>
  <button class="pill" data-f="birthday">🎂 आज जन्मदिन</button>
  <button class="pill" data-f="recent">🕐 हाल के</button>
</div>

<div class="bulk-bar">
  <div class="bb-title">📤 बल्क मैसेज</div>
  <button class="bulk-btn green" onclick="bulkPrep('udhari')">💰 उधारी याद</button>
  <button class="bulk-btn blue" onclick="bulkPrep('menu')">🍽️ मेनू</button>
</div>

<div id="list" class="list"></div>

<!-- Single customer modal -->
<div class="modal-bg" id="single-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal('single-modal')">×</button>
    <div class="modal-title" id="sm-title">💬 मैसेज</div>
    <div id="sm-body"></div>
  </div>
</div>

<!-- Bulk modal -->
<div class="modal-bg" id="bulk-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal('bulk-modal')">×</button>
    <div class="modal-title">📤 बल्क मैसेज</div>
    <div id="bulk-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let DB = {customers:[],bills:[],menu_items:[],settings:{}};
let curFilter = 'all';

function loadDB(){
  try{
    const d = localStorage.getItem('marwar_data');
    if(d){
      const parsed = JSON.parse(d);
      DB = {...DB, ...parsed};
    }
  }catch(e){console.error('Load failed', e)}
}

function escapeHtml(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function fmt(n){
  if(n==null||isNaN(n)) return '₹0';
  return '₹' + Math.round(parseFloat(n)).toLocaleString('en-IN');
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}
function openModal(id){
  document.getElementById(id).classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(id){
  document.getElementById(id).classList.remove('show');
  document.body.style.overflow='';
}
function isBirthdayToday(bd){
  if(!bd) return false;
  const t = new Date();
  const [y,m,d] = bd.split('-').map(Number);
  return t.getMonth()+1===m && t.getDate()===d;
}

function setFilter(f){
  curFilter = f;
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active', p.dataset.f===f));
  render();
}

function getFilteredList(){
  const q = (document.getElementById('q').value||'').trim().toLowerCase();
  let list = (DB.customers||[]).slice();
  if(curFilter==='vip') list = list.filter(c=>c.vip);
  else if(curFilter==='phone') list = list.filter(c=>c.phone && c.phone.length===10);
  else if(curFilter==='birthday') list = list.filter(c=>isBirthdayToday(c.birthday));
  else if(curFilter==='recent') list = list.sort((a,b)=>(b.created||0)-(a.created||0)).slice(0,20);
  if(q) list = list.filter(c=>(c.name||'').toLowerCase().includes(q) || (c.phone||'').includes(q) || (c.address||'').toLowerCase().includes(q));
  list.sort((a,b)=>(b.created||0)-(a.created||0));
  return list;
}

function render(){
  const list = getFilteredList();
  const cont = document.getElementById('list');
  if(list.length===0){
    cont.innerHTML = `<div class="empty"><span class="ic">👤</span><div>कोई ग्राहक नहीं मिला</div></div>`;
    return;
  }
  cont.innerHTML = list.map(c=>{
    const hasPhone = !!(c.phone && c.phone.length===10);
    const bd = isBirthdayToday(c.birthday);
    return `
      <div class="cust-card">
        <div class="cc-head">
          <div style="flex:1;min-width:0">
            <div class="cc-name">${c.vip?'⭐ ':''}${escapeHtml(c.name)} ${bd?'🎂':''}</div>
            <div class="cc-meta">${hasPhone?`📞 ${escapeHtml(c.phone)}`:'<span style="color:var(--red)">फोन नहीं</span>'}${c.address?` • 📍 ${escapeHtml(c.address)}`:''}</div>
          </div>
        </div>
        <div class="cc-actions">
          ${hasPhone?`<button class="btn green" onclick="openSingle('${c.id}')">💬 मैसेज / ऑर्डर</button>`:''}
          ${hasPhone?`<button class="btn" onclick="window.location.href='tel:${c.phone}'">📞 कॉल</button>`:''}
        </div>
      </div>`;
  }).join('');
}

function getMenuMessage_menu(name){
  // alias — same as getMenuMessage but simpler call
  return getMenuMessage(name, '', '');
}

function getUdhariMessage(billNo, amount){
  const s = DB.settings || {};
  return `Jai Hind!

Dear Valued Customer,

We at Marwad Rasoi are truly grateful for your love,
trust, and continued support. Serving you is our
greatest honor.

This is a polite reminder that the following amount
is currently due against your account:

------------------------------
Bill Number  : ${billNo||'-'}
Amount Due   : Rs. ${amount}
------------------------------

We humbly request you to kindly clear this amount
at your earliest convenience. Your prompt response
helps us continue serving you with the same quality
and dedication you deserve.

PAYMENT DETAILS:
UPI / PhonePe : ${s.upi_phone||'6367183480'}
UPI ID         : ${s.upi_id||'vikram3600@ibl'}

After completing the payment, kindly share a
screenshot for our records. Thank you!

For any queries, feel free to reach us:
Contact : ${s.contact||'6367183480 / 8696283600'}

You are not just our customer, you are part of the
Marwad Rasoi family. We look forward to serving you
again with the same warmth and flavors you love.

Warm Regards,
Marwad Rasoi Family
"A Promise of Taste and Purity"
Jai Hind! Jai Bharat!`;
}

function getMenuMessage(name, deal, minOrder){
  const groups = {};
  (DB.menu_items||[]).forEach(m=>{
    if(!groups[m.category]) groups[m.category]=[];
    groups[m.category].push(m);
  });
  let text = `Jai Hind!\n\nMarwad Rasoi - Menu Card\n"A Promise of Taste and Purity"\n\nOrder by Phone:\n1. Swroop (Manager) : 9166753417\n2. Manoj            : 8696283600\n3. Bhanwar Saa      : 6376653196\n4. Ravi Saa         : 7665326484\n5. Narpat Bhai      : 7296919838\n6. Mukesh Bhai      : 8949761842\n\nCustomer Care:\nVikram : 9509553600\n\nWhatsApp Catalog Order:\nhttps://wa.me/c/916367183480\n\nTimings:\nHoliday Lunch  : 11:30 AM - 2:30 PM\nAll Day Dinner : 6:30 PM - 10:30 PM\n\nFREE HOME DELIVERY AVAILABLE\n\n------------------------------\n\n`;
  if(Object.keys(groups).length===0){
    text += '(Menu items not added yet)\n';
  } else {
    Object.entries(groups).forEach(([cat,items])=>{
      text += `--- ${cat.toUpperCase()} ---\n\n`;
      items.sort((a,b)=>a.name.localeCompare(b.name)).forEach(m=>{
        text += `${m.name.padEnd(25)} - Rs. ${m.price>0?m.price:'MRP'}\n`;
      });
      text += '\n';
    });
  }
  text += `------------------------------\nOfficial WhatsApp Channel:\nhttps://whatsapp.com/channel/0029Vai8Do4HltY0PHSaT828\n\nThank you for choosing Marwad Rasoi.\nWe are honored to be your dining partner.\n\nMarwad Rasoi Family\nJai Hind!`;
  return text;
}

function openSingle(custId){
  const c = (DB.customers||[]).find(x=>x.id===custId);
  if(!c){toast('⚠️ ग्राहक नहीं मिला');return}
  
  // Get pending bills for this customer
  const pendingBills = (DB.bills||[]).filter(b=>b.status==='pending'&&((c.phone&&b.phone===c.phone)||b.name===c.name));
  const totalUdhari = pendingBills.reduce((s,b)=>s+b.amount,0);
  
  document.getElementById('sm-title').innerHTML = `💬 ${escapeHtml(c.phone||c.name)}`;
  const body = document.getElementById('sm-body');
  body.innerHTML = `
    <div style="background:var(--cream);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:10px">
      <div style="font-size:15px;font-weight:700">${c.phone?`📞 ${escapeHtml(c.phone)}`:'📵 नं. नहीं'}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px">${escapeHtml(c.name)}</div>
      ${c.address?`<div style="font-size:12px;color:var(--soft-ink);margin-top:2px">📍 ${escapeHtml(c.address)}</div>`:''}
    </div>
    
    ${pendingBills.length>0?`
    <div class="section-card" style="border-left:3px solid var(--red)">
      <div class="section-card-title">💰 उधारी — Rs. ${totalUdhari}</div>
      ${pendingBills.map(b=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px dashed #f0e4cc">
          <div>
            <div style="font-size:13px;font-weight:600">Bill ${escapeHtml(b.bill_no||'-')} — Rs. ${b.amount}</div>
            <div style="font-size:11px;color:var(--muted)">${b.date||''}</div>
          </div>
          <button class="btn green" onclick="sendUdhari('${b.id}','${escapeHtml(c.phone||'')}')">📲 भेजें</button>
        </div>
      `).join('')}
    </div>`:''}
    
    <div class="section-card">
      <div class="section-card-title">🍽️ मेनू भेजें</div>
      <button class="btn green btn-block" onclick="sendMenu('${c.id}')">📤 मेनू WhatsApp</button>
    </div>
    
    <div class="section-card">
      <div class="section-card-title">📞 कॉल</div>
      <button class="btn btn-block" onclick="window.location.href='tel:${escapeHtml(c.phone||'')}'">📞 Call (${escapeHtml(c.phone||'')})</button>
    </div>
  `;
  openModal('single-modal');
}

function sendUdhari(billId, phone){
  const b = (DB.bills||[]).find(x=>x.id===billId);
  if(!b) return;
  const msg = getUdhariMessage(b.bill_no, b.amount);
  if(phone) window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`, '_blank');
  else { navigator.clipboard?.writeText(msg); toast('📋 Copy हो गया'); }
  toast('📲 WhatsApp खुल रहा है');
}

function sendQuick(id, type){
  if(type==='menu'){
    sendMenu(id);
  }
  // greeting/festival/offer removed
}
function sendMenu(id){
  const c = (DB.customers||[]).find(x=>x.id===id);
  if(!c||!c.phone) return;
  const text = getMenuMessage(c.name, '', '');
  window.open(`https://wa.me/91${c.phone}?text=${encodeURIComponent(text)}`, '_blank');
  toast('📤 मेनू भेजा जा रहा है');
}
function sendCustom(id, channel){
  const c = (DB.customers||[]).find(x=>x.id===id);
  if(!c||!c.phone) return;
  const msg = (document.getElementById('sm-custom')?.value||'').trim();
  if(!msg){toast('⚠️ मैसेज लिखें');return}
  if(channel==='wa'){
    window.open(`https://wa.me/91${c.phone}?text=${encodeURIComponent(msg)}`, '_blank');
    toast('📤 WhatsApp खुल रहा है');
  } else {
    const smsUrl = /Android/i.test(navigator.userAgent)
      ? `sms:${c.phone}?body=${encodeURIComponent(msg)}`
      : `sms:${c.phone}&body=${encodeURIComponent(msg)}`;
    window.location.href = smsUrl;
    toast('💬 SMS खुल रहा है');
  }
}

let bulkQueue=[], bulkIdx=0, bulkType='', bulkExtra={};
function bulkPrep(type){
  let list;
  if(type==='udhari'){
    // Only people with pending bills
    const pending = (DB.bills||[]).filter(b=>b.status==='pending'&&b.phone&&b.phone.length===10);
    const seen = new Set();
    list = pending.filter(b=>{ if(seen.has(b.phone)) return false; seen.add(b.phone); return true; })
                  .map(b=>({...b, _isBill:true}));
  } else {
    list = getFilteredList().filter(c=>c.phone && c.phone.length===10);
  }
  if(list.length===0){toast('⚠️ कोई नहीं मिला');return}
  
  const body = document.getElementById('bulk-body');
  if(type==='udhari'){
    body.innerHTML = `
      <div style="font-size:13px;margin-bottom:8px;color:var(--soft-ink)">
        <strong>${list.length} उधारी वाले</strong> को original Marwad Rasoi format में जाएगा
      </div>
      <div style="background:#FFD6D6;border-radius:8px;padding:8px;font-size:11px;margin-bottom:10px">
        Bill Number, Amount Due, Payment Details — सब कुछ original format में
      </div>
      <button class="btn green btn-block" onclick="bulkStart('udhari')">📤 ${list.length} को भेजना शुरू करें</button>
    `;
  } else {
    body.innerHTML = `
      <div style="font-size:13px;margin-bottom:8px;color:var(--soft-ink)">
        <strong>${list.length} ग्राहक</strong> को Marwad Rasoi Menu Card जाएगा
      </div>
      <button class="btn green btn-block" onclick="bulkStart('menu')">📤 ${list.length} को भेजना शुरू करें</button>
    `;
  }
  bulkQueue = list;
  openModal('bulk-modal');
}

function bulkStart(type){
  bulkType = type;
  bulkIdx = 0;
  closeModal('bulk-modal');
  bulkNext();
}

function bulkNext(){
  if(bulkIdx>=bulkQueue.length){toast(`✅ सब ${bulkQueue.length} हो गए!`);return}
  const item = bulkQueue[bulkIdx];
  let msg, phone;
  
  if(bulkType==='udhari'){
    phone = item.phone;
    msg = getUdhariMessage(item.bill_no, item.amount);
  } else {
    phone = item.phone;
    msg = getMenuMessage(item.name, '', '');
  }
  
  window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(msg)}`, '_blank');
  bulkIdx++;
  toast(`📤 ${bulkIdx}/${bulkQueue.length}`);
  setTimeout(bulkNext, 1700);
}

document.addEventListener('DOMContentLoaded', ()=>{
  loadDB();
  document.getElementById('q').addEventListener('input', render);
  document.querySelectorAll('.pill').forEach(p=>{
    p.addEventListener('click', ()=>setFilter(p.dataset.f));
  });
  document.querySelectorAll('.modal-bg').forEach(bg=>{
    bg.addEventListener('click', e=>{if(e.target===bg){bg.classList.remove('show');document.body.style.overflow=''}});
  });
  render();
});
</script>
</body>
</html>
