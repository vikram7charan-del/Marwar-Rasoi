<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C04000">
<title>🔍 यूनिवर्सल सर्च — मारवाड़ रसोई</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --saffron:#E85D04;
  --deep-saffron:#C04000;
  --cream:#FFF8E7;
  --warm-bg:#FDF6E3;
  --ink:#2B1810;
  --soft-ink:#5C3A21;
  --muted:#8a7158;
  --gold:#D4A017;
  --green:#2D6A4F;
  --red:#9D0208;
  --blue:#1d4e89;
  --border:#E6D5B8;
  --shadow:rgba(80,40,10,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:'Inter','Segoe UI',sans-serif;
  background:var(--warm-bg);
  color:var(--ink);
  min-height:100vh;
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}

.header{
  background:linear-gradient(135deg,var(--deep-saffron),var(--saffron));
  color:var(--cream);
  padding:12px 14px;
  position:sticky;
  top:0;
  z-index:50;
  box-shadow:0 2px 12px var(--shadow);
}
.header-row{display:flex;align-items:center;gap:10px}
.back-btn{
  width:36px;height:36px;
  background:rgba(255,255,255,0.18);
  border:1px solid rgba(255,255,255,0.3);
  color:#fff;
  border-radius:9px;
  font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  flex-shrink:0;
  text-decoration:none;
}
.title{
  font-family:'Tiro Devanagari Hindi',serif;
  font-size:18px;
  flex:1;
}

.search-wrap{
  position:sticky;
  top:60px;
  z-index:40;
  background:var(--warm-bg);
  padding:10px 12px;
  border-bottom:1px solid var(--border);
}
.search-input{
  width:100%;
  padding:12px 14px;
  font-size:15px;
  background:#fff;
  border:2px solid var(--gold);
  border-radius:10px;
  font-family:inherit;
  color:var(--ink);
}
.search-input:focus{outline:none;border-color:var(--deep-saffron)}

.tabs{
  display:flex;
  gap:6px;
  overflow-x:auto;
  padding:8px 12px;
  background:#fff;
  border-bottom:1px solid var(--border);
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;
  padding:6px 14px;
  background:var(--cream);
  border:1px solid var(--border);
  border-radius:18px;
  font-size:13px;
  font-weight:500;
  color:var(--soft-ink);
  cursor:pointer;
  white-space:nowrap;
}
.tab.active{
  background:var(--deep-saffron);
  color:#fff;
  border-color:var(--deep-saffron);
}

.results{padding:10px 12px 80px}
.empty{
  text-align:center;
  padding:60px 12px;
  color:var(--muted);
}
.empty .ic{font-size:50px;margin-bottom:10px;display:block}

.section-title{
  font-size:11px;
  font-weight:700;
  color:var(--deep-saffron);
  text-transform:uppercase;
  letter-spacing:0.6px;
  margin:14px 0 6px;
  padding:0 2px;
}
.section-title:first-child{margin-top:4px}

.result{
  background:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  padding:11px 12px;
  margin-bottom:6px;
  cursor:pointer;
  transition:transform 0.1s;
}
.result:active{transform:scale(0.99);background:var(--cream)}
.r-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:8px;
}
.r-title{
  font-size:14px;
  font-weight:600;
  line-height:1.3;
}
.r-meta{
  font-size:12px;
  color:var(--muted);
  margin-top:3px;
  line-height:1.3;
}
.r-amt{
  font-size:14px;
  font-weight:700;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
}
.tag{
  display:inline-block;
  padding:1px 8px;
  border-radius:10px;
  font-size:9px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-right:5px;
  vertical-align:middle;
}
.t-cust{background:#FEF3C7;color:#92400E}
.t-bill{background:#FEE2E2;color:#991B1B}
.t-bill.paid{background:#D1FAE5;color:#065F46}
.t-item{background:#DBEAFE;color:#1E40AF}
.t-menu{background:#FCE7F3;color:#9F1239}
.t-vendor{background:#E0E7FF;color:#3730A3}
.t-staff{background:#D1FAE5;color:#065F46}
mark{
  background:#FEF08A;
  color:var(--ink);
  padding:0 2px;
  border-radius:2px;
  font-weight:700;
}
.notice{
  background:#FEF3C7;
  border:1px solid #FCD34D;
  border-radius:8px;
  padding:10px 12px;
  margin:10px 12px;
  font-size:13px;
  color:#78350F;
}
</style>
</head>
<body>

<header class="header">
  <div class="header-row">
    <a href="index.html" class="back-btn">←</a>
    <div class="title">🔍 यूनिवर्सल सर्च</div>
  </div>
</header>

<div class="search-wrap">
  <input type="text" class="search-input" id="q" placeholder="कुछ भी खोजें... (नाम, फोन, आइटम, बिल नं.)" autocomplete="off" autofocus>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-f="all">सभी</button>
  <button class="tab" data-f="customer">👤 ग्राहक</button>
  <button class="tab" data-f="bill">📄 बिल</button>
  <button class="tab" data-f="item">📚 आइटम</button>
  <button class="tab" data-f="menu">🍽️ मेनू</button>
  <button class="tab" data-f="vendor">🏪 वेंडर</button>
  <button class="tab" data-f="staff">👥 स्टाफ</button>
</div>

<div id="results" class="results"></div>

<script>
let DB = {bills:[],customers:[],master_items:[],menu_items:[],vendors:[],staff:[],purchases:[],settings:{}};
let curFilter = 'all';

function loadDB(){
  try{
    const d = localStorage.getItem('marwar_data');
    if(d){
      const parsed = JSON.parse(d);
      DB = {...DB, ...parsed};
    }
  }catch(e){console.error('Load failed', e)}
}

function escapeHtml(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function fmt(n){
  if(n==null||isNaN(n)) return '₹0';
  const v = Math.round(parseFloat(n));
  return '₹' + v.toLocaleString('en-IN');
}
function highlight(text, q){
  if(!q || !text) return escapeHtml(text||'');
  const safe = escapeHtml(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return safe.replace(re, '<mark>$1</mark>');
}

function calcVendorBalance(id){
  // Best effort — if exact algo unknown, sum purchases minus payments
  const purch = (DB.purchases||[]).filter(p=>p.vendor_id===id).reduce((s,p)=>s+(p.amount||0),0);
  const paid = (DB.vendor_payments||[]).filter(p=>p.vendor_id===id).reduce((s,p)=>s+(p.amount||0),0);
  return purch - paid;
}

function setFilter(f){
  curFilter = f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.f===f));
  render();
}

function render(){
  const q = (document.getElementById('q').value||'').trim().toLowerCase();
  const cont = document.getElementById('results');
  
  if(!q){
    cont.innerHTML = `
      <div class="empty">
        <span class="ic">🔎</span>
        <div>ऊपर टाइप करें — हर जगह से रिज़ल्ट</div>
        <div style="font-size:12px;margin-top:8px;opacity:0.7">📞 फोन • 🏷️ नाम • 📦 आइटम कुछ भी</div>
        <div style="font-size:12px;margin-top:14px;color:var(--green)">
          📊 कुल डेटा: ${(DB.customers||[]).length} ग्राहक • ${(DB.bills||[]).length} बिल • ${(DB.master_items||[]).length} आइटम
        </div>
      </div>`;
    return;
  }
  
  const sec = [];
  
  if(curFilter==='all' || curFilter==='customer'){
    const m = (DB.customers||[]).filter(c=>
      (c.name||'').toLowerCase().includes(q) ||
      (c.phone||'').includes(q) ||
      (c.address||'').toLowerCase().includes(q) ||
      (c.note||'').toLowerCase().includes(q)
    ).slice(0,20);
    if(m.length){
      sec.push({title:`👤 ग्राहक (${m.length})`, html: m.map(c=>`
        <div class="result" onclick="goToCustomer('${c.id}')">
          <div class="r-head">
            <div style="flex:1;min-width:0">
              <div class="r-title"><span class="tag t-cust">ग्राहक</span>${c.vip?'⭐ ':''}${highlight(c.name, q)}</div>
              <div class="r-meta">${c.phone?`📞 ${highlight(c.phone, q)}`:'<span style="color:var(--red)">फोन नहीं</span>'}${c.address?` • 📍 ${highlight(c.address, q)}`:''}</div>
            </div>
            <div style="font-size:18px">💬</div>
          </div>
        </div>`).join('')});
    }
  }
  
  if(curFilter==='all' || curFilter==='bill'){
    const m = (DB.bills||[]).filter(b=>
      (b.name||'').toLowerCase().includes(q) ||
      (b.phone||'').includes(q) ||
      (b.items||'').toLowerCase().includes(q) ||
      (b.location||'').toLowerCase().includes(q) ||
      (b.bill_no||'').toString().toLowerCase().includes(q) ||
      (b.note||'').toLowerCase().includes(q)
    ).sort((a,b)=>(b.created||0)-(a.created||0)).slice(0,20);
    if(m.length){
      sec.push({title:`📄 बिल (${m.length})`, html: m.map(b=>{
        const isPaid = b.status==='paid';
        const itemsLine = b.items ? b.items.split('\n').slice(0,2).join(' • ') : '';
        return `
          <div class="result" onclick="goToBill('${b.name||''}')">
            <div class="r-head">
              <div style="flex:1;min-width:0">
                <div class="r-title"><span class="tag t-bill ${isPaid?'paid':''}">${isPaid?'चुकता':'पेंडिंग'}</span>${highlight(b.name||'-', q)}</div>
                <div class="r-meta">${b.bill_no?`#${highlight(b.bill_no, q)} • `:''}${b.date||''}${b.phone?` • 📞 ${highlight(b.phone, q)}`:''}${b.location?` • 📍 ${highlight(b.location, q)}`:''}</div>
                ${itemsLine?`<div class="r-meta" style="color:var(--blue);margin-top:3px">📦 ${highlight(itemsLine, q)}</div>`:''}
              </div>
              <div class="r-amt mono" style="color:${isPaid?'var(--green)':'var(--red)'}">${fmt(b.amount)}</div>
            </div>
          </div>`;
      }).join('')});
    }
  }
  
  if(curFilter==='all' || curFilter==='item'){
    const m = (DB.master_items||[]).filter(x=>
      (x.name||'').toLowerCase().includes(q) ||
      (x.category||'').toLowerCase().includes(q)
    ).slice(0,20);
    if(m.length){
      sec.push({title:`📚 आइटम लिस्ट (${m.length})`, html: m.map(x=>`
        <div class="result" onclick="goToTab('purchase')">
          <div class="r-head">
            <div style="flex:1;min-width:0">
              <div class="r-title"><span class="tag t-item">आइटम</span>${highlight(x.name, q)}</div>
              <div class="r-meta">${x.category||''} • ${x.unit||''}</div>
            </div>
            <div class="r-amt mono">${x.last_price>0?fmt(x.last_price):'—'}</div>
          </div>
        </div>`).join('')});
    }
  }
  
  if(curFilter==='all' || curFilter==='menu'){
    const m = (DB.menu_items||[]).filter(x=>
      (x.name||'').toLowerCase().includes(q) ||
      (x.category||'').toLowerCase().includes(q)
    ).slice(0,20);
    if(m.length){
      sec.push({title:`🍽️ मेनू (${m.length})`, html: m.map(x=>`
        <div class="result" onclick="goToTab('sales')">
          <div class="r-head">
            <div style="flex:1;min-width:0">
              <div class="r-title"><span class="tag t-menu">मेनू</span>${x.special?'⭐ ':''}${highlight(x.name, q)}</div>
              <div class="r-meta">${x.category||''}</div>
            </div>
            <div class="r-amt mono">${x.price>0?fmt(x.price):'MRP'}</div>
          </div>
        </div>`).join('')});
    }
  }
  
  if(curFilter==='all' || curFilter==='vendor'){
    const m = (DB.vendors||[]).filter(v=>
      (v.name||'').toLowerCase().includes(q) ||
      (v.phone||'').includes(q) ||
      (v.address||'').toLowerCase().includes(q)
    ).slice(0,20);
    if(m.length){
      sec.push({title:`🏪 विक्रेता (${m.length})`, html: m.map(v=>{
        const bal = calcVendorBalance(v.id);
        return `
          <div class="result" onclick="goToTab('purchase')">
            <div class="r-head">
              <div style="flex:1;min-width:0">
                <div class="r-title"><span class="tag t-vendor">वेंडर</span>${highlight(v.name, q)}</div>
                <div class="r-meta">${v.phone?`📞 ${highlight(v.phone, q)}`:''}${v.address?` • ${highlight(v.address, q)}`:''}</div>
              </div>
              <div class="r-amt mono" style="color:${bal>0?'var(--red)':'var(--green)'}">${fmt(bal)}</div>
            </div>
          </div>`;
      }).join('')});
    }
  }
  
  if(curFilter==='all' || curFilter==='staff'){
    const m = (DB.staff||[]).filter(s=>
      (s.name||'').toLowerCase().includes(q) ||
      (s.phone||'').includes(q) ||
      (s.role||'').toLowerCase().includes(q)
    ).slice(0,20);
    if(m.length){
      sec.push({title:`👥 स्टाफ (${m.length})`, html: m.map(s=>`
        <div class="result" onclick="goToTab('staff')">
          <div class="r-head">
            <div style="flex:1;min-width:0">
              <div class="r-title"><span class="tag t-staff">स्टाफ</span>${highlight(s.name, q)}</div>
              <div class="r-meta">${s.role||''}${s.phone?` • 📞 ${highlight(s.phone, q)}`:''}${s.salary?` • वेतन ₹${s.salary}`:''}</div>
            </div>
            <div style="font-size:14px">${s.active?'✅':'⏸️'}</div>
          </div>
        </div>`).join('')});
    }
  }
  
  if(sec.length===0){
    cont.innerHTML = `<div class="empty"><span class="ic">😕</span><div>"${escapeHtml(q)}" के लिए कुछ नहीं मिला</div></div>`;
    return;
  }
  cont.innerHTML = sec.map(s=>`<div class="section-title">${s.title}</div>${s.html}`).join('');
}

function goToCustomer(id){
  // Pass intent via sessionStorage so main app can pick it up
  sessionStorage.setItem('marwar_intent', JSON.stringify({type:'open_customer_msg', id}));
  window.location.href = 'index.html';
}
function goToBill(name){
  sessionStorage.setItem('marwar_intent', JSON.stringify({type:'goto_bill', search:name}));
  window.location.href = 'index.html';
}
function goToTab(tab){
  sessionStorage.setItem('marwar_intent', JSON.stringify({type:'goto_tab', tab}));
  window.location.href = 'index.html';
}

document.addEventListener('DOMContentLoaded', ()=>{
  loadDB();
  document.getElementById('q').addEventListener('input', render);
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', ()=>setFilter(t.dataset.f));
  });
  render();
});
</script>
</body>
</html>
